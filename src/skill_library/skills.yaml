# 知乎模块

  - id: "domain/zhihu_send"
    name: "知乎发布"
    type: "domain"
    triggers: ["知乎发布", "知乎 发布", "发布", "写文章", "发文章", "投稿"]
    url_patterns: ["zhihu.com", "zhuanlan.zhihu.com"]
    description: "在知乎发布文章"
    version: "1.0.0"
    examples:
      - "在知乎发布一篇文章"
      - "知乎发文章 内容是 如何学习编程"
    params:
      title:
        type: title
        required: true
        description: "文章标题"
        ai_generate: true
        extract_patterns:
          - "(?:标题|题目|title)\\s*(?:是|为|:|：)?\\s*['\"“‘]?(.+?)['\"”’]?(?=\\s*(?:内容|正文|文章内容|body|content)\\s*(?:是|为|:|：)?|$)"
      keyword:
        type: content
        required: true
        description: "文章内容"
        ai_generate: true
        extract_patterns:
          - "(?:内容|正文|文章内容|body|content)\\s*(?:是|为|:|：)?\\s*(.+)$"
          - "(?:在|到)?知乎(?:上)?(?:发布|发表|发|写)(?:文章|帖子|回答)?\\s*[:：]?\\s*(.+)$"
          - "(?:发布|发表|发|写)(?:文章|帖子|回答)?\\s*[:：]?\\s*(.+)$"
      add-picture:
        type: boolean
        required: false
        default: "no"
        confirm: true
        description: "是否在文章正文中插入 AI 生成图片"
        extract_patterns:
          - "(?:(配图|加图|加图片|生成图片|插入图片|AI\\s*配图|ai\\s*picture|add[-_ ]?picture))"
    confirm_before_run: true

  - id: "domain/zhihu_approve"
    name: "知乎点赞"
    type: "domain"
    triggers: ["知乎点赞"]
    url_patterns: ["zhihu.com", "zhuanlan.zhihu.com"]
    description: "在知乎点赞文章"
    version: "1.0.0"
    examples:
      - "在知乎给一篇文章点赞"
    params:
      article_url:
        type: url
        required: true
        description: "对应操作的文章地址"
        extract_patterns:
          - "(https?://[^\\s，。！？；;]+)"
    confirm_before_run: true

  - id: "domain/zhihu_search"
    name: "知乎搜索"
    type: "domain"
    platform: "zhihu"
    action: "search"
    triggers: ["知乎搜索", "知乎 搜索", "在知乎搜索", "知乎上搜", "知乎搜", "搜索知乎", "zhihu", "zhihu search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:知乎|zhihu)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:知乎|zhihu)(?:上)?[。.!！?？\\s]*$"
    url_patterns: ["zhihu.com"]
    description: "在知乎搜索"
    version: "1.0.0"
    examples:
      - "在知乎搜索 Python 入门"
      - "知乎上搜一下如何学编程"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/zhihu_comment"
    name: "知乎评论"
    type: "domain"
    triggers: ["知乎评论", "知乎 评论", "知乎回复", "知乎 回复", "评论知乎", "回复知乎"]
    url_patterns: ["zhihu.com", "zhuanlan.zhihu.com"]
    description: "在知乎评论"
    version: "1.0.0"
    examples:
      - "在知乎评论 你好"
      - "知乎回复 内容是 写得很好"
    params:
      article_url:
        type: url
        required: true
        description: "对应操作的文章地址"
        extract_patterns:
          - "(https?://[^\\s，。！？；;]+)"
      keyword:
        type: keyword
        required: false
        description: "评论内容"

  - id: "domain/zhihu_answer"
    name: "知乎回答"
    type: "domain"
    triggers: ["知乎 回答","知乎回答"]
    url_patterns: ["zhihu.com", "zhuanlan.zhihu.com"]
    description: "在知乎回答"
    version: "1.0.0"
    examples:
      - "在知乎评论 你好"
      - "知乎回复 内容是 写得很好"
    params:
      keyword:
        type: keyword
        required: true
        description: "回答内容"
      article_url:
        type: url
        required: true
        description: "对应操作的文章地址"
        extract_patterns:
          - "(https?://[^\\s，。！？；;]+)"

  - id: "domain/zhihu_question"
    name: "知乎提问题"
    type: "domain"
    triggers: ["知乎提问题", "知乎 提问题", "知乎提问", "知乎 提问"]
    url_patterns: ["zhihu.com"]
    description: "打开知乎首页并点击提问题入口"
    version: "1.0.0"
    examples:
      - "知乎提问题"
      - "打开知乎提问"
    params:
      keyword:
        type: keyword
        required: false
        description: "预留问题内容"
        extract_patterns:
          - "(?:在|到)?知乎(?:上)?(?:提问|提问题)\\s*[:：]?\\s*(.+)$"
          - "知乎\\s*(?:提问|提问题)\\s*[:：]?\\s*(.+)$"
          - "(?:提问|提问题)\\s*[:：]?\\s*(.+)$"

