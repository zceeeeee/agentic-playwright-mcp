  - id: "domain/douyin_login"
    file: "others/douyin_login.py"
    entry: "run"

  - id: "domain/xiaohongshu_login"
    file: "others/xiaohongshu_login.py"
    entry: "run"

  - id: "domain/weibo_search"
    file: "search/weibo_search.py"
    entry: "run"

  - id: "domain/zhihu_search"
    file: "search/zhihu_search.py"
