# skills.yaml -- 技能索引配置
#
# 本文件是 skill_library 的唯一数据源，由 SkillRegistry.load_from_yaml() 和
# SkillRouter 加载。
#
# 结构:
#   skills   - 技能元数据列表（对应 SkillMeta + 路由扩展字段）
#   sources  - 文件映射列表（对应 SkillFileMapping，用于动态加载和实例化）
#
# 路由扩展字段（由 SkillRouter 使用）:
#   examples           - 示例任务描述列表，用于关键词匹配和 LLM 精排
#   params             - 参数声明，用于从任务中自动提取参数
#     type             - 参数类型: keyword | phone | email | url | quoted | string
#     required         - 是否必填
#     description      - 参数描述（给 LLM 看的）
#     extract_patterns - 自定义正则提取模式列表（优先于通用提取）
#   confirm_before_run - 是否需要用户确认后才执行（发布类操作）

skills:
  # ──────────────────────────────────────────────
  # 搜索引擎
  # ──────────────────────────────────────────────

  - id: "domain/baidu_search"
    name: "百度搜索"
    type: "domain"
    platform: "baidu"
    action: "search"
    triggers: ["百度", "baidu", "搜索", "search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:百度|baidu)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:百度|baidu)(?:上)?$"
    url_patterns: ["baidu.com"]
    description: "在百度搜索关键词并返回结果"
    version: "1.0.0"
    examples:
      - "在百度搜索 Python 教程"
      - "百度查一下今天的天气"
      - "用百度搜一下附近的餐厅"
      - "帮我在百度搜索最新新闻"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/google_search"
    name: "Google 搜索"
    type: "domain"
    platform: "google"
    action: "search"
    triggers: ["google", "谷歌", "搜索", "search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:google|谷歌)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:google|谷歌)(?:上)?$"
    url_patterns: ["google.com"]
    description: "在 Google 搜索关键词"
    version: "1.0.0"
    examples:
      - "在 Google 搜索 Python tutorial"
      - "谷歌搜一下 machine learning"
      - "用 Google 查一下航班信息"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/bing_search"
    name: "Bing 搜索"
    type: "domain"
    platform: "bing"
    action: "search"
    triggers: ["bing", "必应", "搜索", "search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:bing|必应)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:bing|必应)(?:上)?$"
    url_patterns: ["bing.com"]
    description: "在 Bing 搜索关键词"
    version: "1.0.0"
    examples:
      - "在 Bing 搜索天气预报"
      - "必应搜一下最近的新闻"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  # ──────────────────────────────────────────────
  # GitHub
  # ──────────────────────────────────────────────

  - id: "domain/github_login"
    name: "GitHub 登录"
    type: "domain"
    triggers: ["github", "登录", "login"]
    url_patterns: ["*.github.com"]
    description: "登录 GitHub 账号"
    version: "1.0.0"
    examples:
      - "登录 GitHub"
      - "帮我登录 github 账号"
      - "GitHub 登录 用户名 xxx 密码 yyy"
    params:
      username:
        type: string
        required: true
        description: "GitHub 用户名或邮箱"
        extract_patterns:
          - "(?:用户名|用户|账号|邮箱|username|email)\\s*(?:是|为|:|：)?\\s*['\"]?([^'\"\\s,，;；。]+)"
      password:
        type: string
        required: true
        description: "GitHub 密码"
        extract_patterns:
          - "(?:密码|口令|password|pass)\\s*(?:是|为|:|：)?\\s*['\"]?([^'\"\\s,，;；。]+)"

  - id: "domain/github_search"
    name: "GitHub 搜索"
    type: "domain"
    platform: "github"
    action: "search"
    triggers: ["github", "搜索", "search", "仓库", "repo"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:github)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:github)(?:上)?$"
      - "(?:github)(?:上)?\\s*(?:找|查找)\\s*(.+)"
    url_patterns: ["github.com/search"]
    description: "在 GitHub 搜索仓库/代码/用户"
    version: "1.0.0"
    examples:
      - "在 GitHub 搜索 playwright 仓库"
      - "GitHub 上找一下 Python 的爬虫项目"
      - "搜一下 GitHub 上的 awesome-python"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/github_repos"
    name: "GitHub 仓库列表"
    type: "domain"
    triggers: ["github", "仓库", "repos", "项目"]
    url_patterns: ["github.com"]
    description: "查看 GitHub 仓库列表"
    version: "1.0.0"
    examples:
      - "看看我的 GitHub 仓库"
      - "GitHub 上有哪些项目"

  # ──────────────────────────────────────────────
  # 电商
  # ──────────────────────────────────────────────

  - id: "domain/amazon_search"
    name: "Amazon 搜索"
    type: "domain"
    platform: "amazon"
    action: "search"
    triggers: ["amazon", "亚马逊", "购物", "商品"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:amazon|亚马逊)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:amazon|亚马逊)(?:上)?$"
    url_patterns: ["amazon.com"]
    description: "在 Amazon 搜索商品"
    version: "1.0.0"
    examples:
      - "在 Amazon 搜索蓝牙耳机"
      - "亚马逊上找一下机械键盘"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  # ──────────────────────────────────────────────
  # 邮箱
  # ──────────────────────────────────────────────

  - id: "domain/gmail_inbox"
    name: "Gmail 收件箱"
    type: "domain"
    triggers: ["gmail", "谷歌邮箱", "邮件", "收件箱"]
    url_patterns: ["mail.google.com"]
    description: "打开 Gmail 收件箱"
    version: "1.0.0"
    examples:
      - "打开 Gmail 收件箱"
      - "看看我的谷歌邮箱"

  - id: "domain/gmail_login"
    name: "Gmail 登录"
    type: "domain"
    triggers: ["gmail", "Gmail", "谷歌邮箱", "Google Mail", "邮箱登录", "登录", "login", "账号", "邮箱", "密码", "验证码"]
    url_patterns: ["mail.google.com", "accounts.google.com"]
    description: "打开 Gmail 中文登录页，填写邮箱和密码，选择第一种登录方式，等待用户输入验证码后完成登录"
    version: "1.0.0"
    examples:
      - "登录 Gmail"
      - "帮我登录谷歌邮箱"
      - "Gmail 登录 邮箱 test@gmail.com 密码 xxx"
    params:
      email:
        type: email
        required: true
        description: "Gmail 邮箱地址"
      password:
        type: string
        required: true
        description: "Gmail 密码"
        extract_patterns:
          - "(?:密码|口令|password|pass)[^A-Za-z0-9@]{0,16}([^\\s,，;；。)）]+)"

  - id: "domain/gmail_send"
    name: "Gmail 发送邮件"
    type: "domain"
    triggers:
      - "gmail"
      - "Gmail"
      - "gmail发送邮件"
      - "Gmail发送邮件"
      - "gmail 发邮件"
      - "Gmail 发邮件"
      - "gmail寄邮件"
      - "发送邮件"
      - "发邮件"
      - "寄邮件"
      - "邮件发送"
      - "收件人"
      - "收件邮箱"
      - "发件邮箱"
      - "发件人"
      - "密码"
      - "标题"
      - "主题"
      - "内容"
      - "正文"
      - "邮件标题"
      - "邮件正文"
      - "send email"
      - "compose email"
      - "Compose"
    url_patterns: ["mail.google.com"]
    description: "检查 Gmail 是否已登录，必要时等待用户手动登录，然后点击 Compose，点击写信窗口右上角 Full screen / Pop-out 放大图标，再填写收件人、标题和正文并发送"
    version: "1.0.0"
    examples:
      - "Gmail发送邮件，收件人是alice@example.com，标题是测试标题，正文是测试正文"
      - "用 Gmail 发邮件给 bob@example.com，主题是 hello，内容是 hi"
    params:
      recipient:
        type: email
        required: true
        description: "收件人邮箱"
        extract_patterns:
          - "(?:收件人|收件邮箱|收信人|发送给|发给|寄给|to|recipient)[^A-Z0-9@]{0,16}([A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,})"
      subject:
        type: title
        required: true
        description: "邮件标题或主题"
        extract_patterns:
          - "(?:邮件标题|信件标题|标题|主题|subject|title)\\s*(?:是|为|:|：|=)?\\s*['\"“‘](.+?)['\"”’]"
          - "(?:邮件标题|信件标题|标题|主题|subject|title)\\s*(?:是|为|:|：|=)?\\s*(.+?)(?=\\s*(?:邮件正文|正文内容|正文|邮件内容|内容|body|content)\\s*(?:是|为|:|：|=)?|$)"
      body:
        type: body
        required: true
        description: "邮件正文"
      sender_email:
        type: email
        required: false
        description: "发件 Gmail 邮箱，用于未登录时自动登录"
        extract_patterns:
          - "(?:发件邮箱|发件人|发信邮箱|发送邮箱|账号邮箱|邮箱账号|sender|from)[^A-Z0-9@]{0,16}([A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,})"
      password:
        type: string
        required: false
        description: "发件 Gmail 密码，用于未登录时自动登录"
        extract_patterns:
          - "(?:密码|口令|password|pass)[^A-Za-z0-9@]{0,16}([^\\s,，;；。)）]+)"
    confirm_before_run: true

  - id: "domain/outlook_inbox"
    name: "Outlook 收件箱"
    type: "domain"
    triggers: ["outlook", "微软邮箱", "邮件", "收件箱"]
    url_patterns: ["outlook.live.com"]
    description: "打开 Outlook 收件箱"
    version: "1.0.0"
    examples:
      - "打开 Outlook 收件箱"
      - "看看我的微软邮箱"

  # ──────────────────────────────────────────────
  # 视频
  # ──────────────────────────────────────────────

  - id: "domain/youtube_search"
    name: "YouTube 搜索"
    type: "domain"
    platform: "youtube"
    action: "search"
    triggers: ["youtube", "油管", "视频", "搜索"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:youtube|油管)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:youtube|油管)(?:上)?$"
    url_patterns: ["youtube.com"]
    description: "在 YouTube 搜索视频"
    version: "1.0.0"
    examples:
      - "在 YouTube 搜索猫咪视频"
      - "油管上找一下 Python 教程"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/bilibili_search"
    name: "Bilibili 搜索"
    type: "domain"
    platform: "bilibili"
    action: "search"
    triggers: ["bilibili", "B站", "b站", "哔哩哔哩", "哔哩", "视频", "搜索", "search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:bilibili|B站|b站|哔哩哔哩|哔哩)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:bilibili|B站|b站|哔哩哔哩|哔哩)(?:上)?$"
    url_patterns: ["bilibili.com"]
    description: "在 Bilibili 搜索视频、番剧、用户和相关内容"
    version: "1.0.0"
    examples:
      - "在 B 站搜索 Python 教程"
      - "bilibili 上找一下游戏视频"
      - "去哔哩哔哩搜一下编程入门"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/bilibili_login"
    name: "Bilibili 短信登录"
    type: "domain"
    triggers: ["bilibili 登录", "bilibili", "B站", "b站", "哔哩哔哩", "登录", "手机号", "短信登录"]
    url_patterns: ["bilibili.com", "*.bilibili.com"]
    description: "打开 Bilibili 登录弹窗，切换短信登录，填写手机号并发送验证码，真人认证和验证码由用户手动完成"
    version: "1.0.0"
    examples:
      - "B站登录"
      - "bilibili 短信登录"
      - "帮我登录 B 站"
    params:
      phone_number:
        type: phone
        required: true
        description: "手机号码"

  - id: "domain/bilibili_publish"
    name: "Bilibili 文章投稿"
    type: "domain"
    triggers: ["bilibili 投稿"]
    url_patterns: ["bilibili.com", "*.bilibili.com", "member.bilibili.com"]
    description: "完成 Bilibili 短信登录后进入文章投稿页，填写标题和正文并点击发布"
    version: "1.0.0"
    examples:
      - "在 B 站投稿一篇文章"
      - "bilibili 发布文章"
    params:
      phone_number:
        type: phone
        required: true
        description: "手机号码"
      title:
        type: title
        required: true
        description: "文章标题"
        extract_patterns:
          - "(?:标题|题目|title)\\s*(?:是|为|:|：)?\\s*['\"\"'']?(.*?)(?=(?:正文|内容|文章内容|body|content)\\s*(?:是|为|:|：)|$)"
      body:
        type: body
        required: true
        description: "文章正文"
        extract_patterns:
          - "(?:正文|内容|文章内容|body|content)\\s*(?:是|为|:|：)?\\s*['\"\"'']?(.+)$"
    confirm_before_run: true

  - id: "domain/bilibili_comment"
    name: "Bilibili 视频评论"
    type: "domain"
    triggers: ["bilibili 视频留言"]
    url_patterns: ["bilibili.com", "*.bilibili.com", "bilibili.com/video/"]
    description: "完成 Bilibili 短信登录后进入视频页面，填写评论内容并点击发送"
    version: "1.0.0"
    examples:
      - "在 B 站视频下面留言"
      - "bilibili 视频评论"
    params:
      phone_number:
        type: phone
        required: true
        description: "手机号码"
      comment_text:
        type: comment_text
        required: true
        description: "评论内容"
        extract_patterns:
          - "(?:评论|留言|回复)\\s*(?:是|为|:|：)?\\s*['\"\"'']?(.+?)(?=(?:在|然后|并且|接着)|$)"
      video_url:
        type: url
        required: false
        description: "视频 URL（可选，默认使用当前页面）"
    confirm_before_run: true

  # ──────────────────────────────────────────────
  # 社交媒体
  # ──────────────────────────────────────────────

  - id: "domain/douyin_login"
    name: "抖音验证码登录"
    type: "domain"
    triggers: ["抖音", "douyin", "douyin.com", "登录", "login", "手机号", "短信登录", "验证码"]
    url_patterns: ["douyin.com", "*.douyin.com"]
    description: "填写抖音手机号并获取短信验证码，验证码由用户手动输入"
    version: "1.0.0"
    examples:
      - "登录抖音"
      - "帮我登录抖音账号"
    params:
      phone_number:
        type: phone
        required: true
        description: "手机号码"

  - id: "domain/xiaohongshu_login"
