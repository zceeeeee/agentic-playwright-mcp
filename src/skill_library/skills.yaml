# skills.yaml -- 技能索引配置
#
# 本文件是 skill_library 的唯一数据源，由 SkillRegistry.load_from_yaml() 加载。
# 替代原来的 registry.json，统一使用 YAML 格式。
#
# 结构:
#   skills   - 技能元数据列表（对应 SkillMeta）
#   sources  - 文件映射列表（对应 SkillFileMapping，用于动态加载和实例化）

skills:
  # 搜索引擎
  - id: "domain/baidu_search"
    name: "百度搜索"
    type: "domain"
    triggers: ["百度", "baidu", "搜索", "search"]
    url_patterns: ["baidu.com"]
    description: "在百度搜索关键词并返回结果"
    version: "1.0.0"

  - id: "domain/google_search"
    name: "Google 搜索"
    type: "domain"
    triggers: ["google", "谷歌", "搜索", "search"]
    url_patterns: ["google.com"]
    description: "在 Google 搜索关键词"
    version: "1.0.0"

  - id: "domain/bing_search"
    name: "Bing 搜索"
    type: "domain"
    triggers: ["bing", "必应", "搜索", "search"]
    url_patterns: ["bing.com"]
    description: "在 Bing 搜索关键词"
    version: "1.0.0"

  # GitHub
  - id: "domain/github_login"
    name: "GitHub 登录"
    type: "domain"
    triggers: ["github", "登录", "login"]
    url_patterns: ["*.github.com"]
    description: "登录 GitHub 账号"
    version: "1.0.0"

  - id: "domain/github_search"
    name: "GitHub 搜索"
    type: "domain"
    triggers: ["github", "搜索", "search", "仓库", "repo"]
    url_patterns: ["github.com/search"]
    description: "在 GitHub 搜索仓库/代码/用户"
    version: "1.0.0"

  - id: "domain/github_repos"
    name: "GitHub 仓库列表"
    type: "domain"
    triggers: ["github", "仓库", "repos", "项目"]
    url_patterns: ["github.com"]
    description: "查看 GitHub 仓库列表"
    version: "1.0.0"

  # 电商
  - id: "domain/amazon_search"
    name: "Amazon 搜索"
    type: "domain"
    triggers: ["amazon", "亚马逊", "购物", "商品"]
    url_patterns: ["amazon.com"]
    description: "在 Amazon 搜索商品"
    version: "1.0.0"

  # 邮箱
  - id: "domain/gmail_inbox"
    name: "Gmail 收件箱"
    type: "domain"
    triggers: ["gmail", "谷歌邮箱", "邮件", "收件箱"]
    url_patterns: ["mail.google.com"]
    description: "打开 Gmail 收件箱"
    version: "1.0.0"

  - id: "domain/outlook_inbox"
    name: "Outlook 收件箱"
    type: "domain"
    triggers: ["outlook", "微软邮箱", "邮件", "收件箱"]
    url_patterns: ["outlook.live.com"]
    description: "打开 Outlook 收件箱"
    version: "1.0.0"

  # 视频
  - id: "domain/youtube_search"
    name: "YouTube 搜索"
    type: "domain"
    triggers: ["youtube", "油管", "视频", "搜索"]
    url_patterns: ["youtube.com"]
    description: "在 YouTube 搜索视频"
    version: "1.0.0"

  # 社交媒体
  - id: "domain/douyin_login"
    name: "抖音验证码登录"
    type: "domain"
    triggers: ["抖音", "douyin", "douyin.com", "登录", "login", "验证码"]
    url_patterns: ["douyin.com", "*.douyin.com"]
    description: "填写抖音手机号并获取短信验证码，验证码由用户手动输入"
    version: "1.0.0"

  - id: "domain/xiaohongshu_login"
    name: "小红书验证码登录"
    type: "domain"
    triggers: ["小红书", "xiaohongshu", "xhs", "rednote", "登录", "login", "验证码"]
    url_patterns: ["xiaohongshu.com", "*.xiaohongshu.com"]
    description: "填写小红书手机号、勾选协议并获取短信验证码，验证码由用户手动输入"
    version: "1.0.0"

  - id: "domain/weibo_search"
    name: "微博搜索"
    type: "domain"
    triggers: ["微博", "weibo", "搜索"]
    url_patterns: ["weibo.com"]
    description: "在微博搜索"
    version: "1.0.0"

  - id: "domain/zhihu_search"
    name: "知乎搜索"
    type: "domain"
    triggers: ["知乎", "zhihu", "搜索", "问答"]
    url_patterns: ["zhihu.com"]
    description: "在知乎搜索"
    version: "1.0.0"

  - id: "domain/bilibili_search"
    name: "b站搜索"
    type: "domain"
    triggers: ["b站", "bilibili", "搜索", "问答"]
    url_patterns: ["bilibili.com"]
    description: "在b站搜索"
    version: "1.0.0"

  - id: "domain/taobao_search"
    name: "淘宝搜索"
    type: "domain"
    triggers: ["淘宝", "taobao", "搜索", "问答"]
    url_patterns: ["taobao.com"]
    description: "在淘宝搜索"
    version: "1.0.0"

  - id: "domain/doubao_search"
    name: "豆包搜索"
    type: "domain"
    triggers: ["豆包", "doubao", "搜索", "问答"]
    url_patterns: ["doubao.com"]
    description: "在豆包搜索"
    version: "1.0.0"


  # 通用交互模板
  - id: "interaction/login_flow"
    name: "通用登录"
    type: "interaction"
    triggers: ["登录", "login", "sign in", "signin"]
    url_patterns: []
    description: "通用登录流程：填写用户名密码并提交"
    version: "1.0.0"

  - id: "interaction/search_flow"
    name: "通用搜索"
    type: "interaction"
    triggers: ["搜索", "search", "查找", "find"]
    url_patterns: []
    description: "通用搜索流程：输入关键词并点击搜索"
    version: "1.0.0"

  - id: "interaction/form_fill"
    name: "通用表单填写"
    type: "interaction"
    triggers: ["表单", "form", "填写", "fill", "注册", "register"]
    url_patterns: []
    description: "通用表单填写：批量填写多个表单字段"
    version: "1.0.0"

  - id: "interaction/pagination"
    name: "通用分页翻页"
    type: "interaction"
    triggers: ["分页", "pagination", "翻页", "next", "下一页"]
    url_patterns: []
    description: "通用分页翻页：遍历多页内容"
    version: "1.0.0"

# sources 段 -- 文件映射，用于动态加载技能模块和实例化 SkillBase 子类
# id 必须与上方 skills 中的 id 一致
sources:
  - id: "domain/baidu_search"
    file: "search/baidu_search.py"
    entry: "run"

  - id: "domain/google_search"
    file: "search/google_search.py"
    entry: "run"

