# skills.yaml -- 技能索引配置
#
# 本文件是 skill_library 的唯一数据源，由 SkillRegistry.load_from_yaml() 和
# SkillRouter 加载。
#
# 结构:
#   skills   - 技能元数据列表（对应 SkillMeta + 路由扩展字段）
#   sources  - 文件映射列表（对应 SkillFileMapping，用于动态加载和实例化）
#
# 路由扩展字段（由 SkillRouter 使用）:
#   examples           - 示例任务描述列表，用于关键词匹配和 LLM 精排
#   params             - 参数声明，用于从任务中自动提取参数
#     type             - 参数类型: keyword | phone | email | url | quoted | string
#     required         - 是否必填
#     description      - 参数描述（给 LLM 看的）
#     extract_patterns - 自定义正则提取模式列表（优先于通用提取）
#   confirm_before_run - 是否需要用户确认后才执行（发布类操作）

skills:
  # ──────────────────────────────────────────────
  # 搜索引擎
  # ──────────────────────────────────────────────

  - id: "domain/baidu_search"
    name: "百度搜索"
    type: "domain"
    platform: "baidu"
    action: "search"
    triggers: ["百度", "baidu", "搜索", "search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:百度|baidu)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:百度|baidu)(?:上)?$"
    url_patterns: ["baidu.com"]
    description: "在百度搜索关键词并返回结果"
    version: "1.0.0"
    examples:
      - "在百度搜索 Python 教程"
      - "百度查一下今天的天气"
      - "用百度搜一下附近的餐厅"
      - "帮我在百度搜索最新新闻"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/google_search"
    name: "Google 搜索"
    type: "domain"
    platform: "google"
    action: "search"
    triggers: ["google", "谷歌", "搜索", "search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:google|谷歌)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:google|谷歌)(?:上)?$"
    url_patterns: ["google.com"]
    description: "在 Google 搜索关键词"
    version: "1.0.0"
    examples:
      - "在 Google 搜索 Python tutorial"
      - "谷歌搜一下 machine learning"
      - "用 Google 查一下航班信息"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/bing_search"
    name: "Bing 搜索"
    type: "domain"
    platform: "bing"
    action: "search"
    triggers: ["bing", "必应", "搜索", "search"]
    trigger_patterns:
      - "(?:在|用|打开)?\\s*(?:bing|必应)(?:上)?\\s*(?:搜索|搜|查找|查询|查|找|search)\\s*(.+)"
      - "(?:搜索|搜|查找|查询|查|找|search)\\s*(.+?)\\s*(?:用|在|到)\\s*(?:bing|必应)(?:上)?$"
    url_patterns: ["bing.com"]
    description: "在 Bing 搜索关键词"
    version: "1.0.0"
    examples:
      - "在 Bing 搜索天气预报"
      - "必应搜一下最近的新闻"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  # ──────────────────────────────────────────────
  # 本地文档 / 导出
  # ──────────────────────────────────────────────

  - id: "domain/wps_document_polish"
    name: "WPS 文章润色与格式修改"
    type: "domain"
    platform: "wps"
    action: "edit"
    triggers: ["WPS润色", "wps润色", "WPS文章润色", "wps文章润色", "WPS文档润色", "润色WPS", "修改WPS文档", "WPS修改格式", "WPS文档排版"]
    trigger_patterns:
      - "^(?:请|帮我|麻烦)?(?:用|在)?(?:WPS|wps|金山文字|Word)(?:中|里)?(?:润色|优化|修改|编辑|排版|格式化)(?:一下)?$"
      - "^(?:请|帮我|麻烦)?(?:用|在)?(?:WPS|wps|金山文字|Word)(?:中|里)?(?:润色|优化|修改|编辑|排版|格式化)(?:一下|这篇|这个)?(?:文章|文档|文件)?(?:[：:\\s]|[\"“]).*(?:\\.docx?|\\.wps)[\"”]?$"
      - "^(?!.*(?:新建|创建|生成文档|写文章))(?:请|帮我|麻烦)?(?:用|在)?(?:WPS|wps|金山文字|Word)?(?:中|里)?(?:润色|优化|修改|编辑|排版|格式化).*(?:文章|文档|文件).*$"
      - "^(?:请|帮我|麻烦)?.*(?:文章|文档|文件).*(?:润色|优化文字|修改格式|重新排版).*(?:WPS|wps|金山文字|Word).*$"
      - "^(?:WPS|wps)(?:文章|文档)(?:润色|优化|修改格式|排版).*$"
    url_patterns: []
    description: "读取用户指定的已有本地 WPS/Word 文档，询问是否用 AI 润色文字及是否按用户要求修改格式；润色 AI 可自行判断是否需要表格并返回占位符与结构化表格数据，随后自动备份并写回原文件"
    version: "1.0.0"
    examples:
      - 'WPS文章润色 "D:\\docs\\报告.docx"'
      - '帮我润色WPS文档 D:\\docs\\总结.docx'
      - '修改这个WPS文档的格式：D:\\docs\\通知.docx'
    params:
      document_path:
        type: string
        required: true
        confirm: true
        description: "已有 WPS/Word 文档的完整路径"
        extract_patterns:
          - '(?:文档路径|文件路径|地址|路径|document_path)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z]:[\\/][^"”\n]+?\.(?:docx?|wps))'
          - '["“]?([A-Za-z]:[\\/][^"”\n]+?\.(?:docx?|wps))["”]?'

  - id: "domain/wps_writer_export"
    name: "WPS 写文章并导出文件"
    type: "domain"
    platform: "wps"
    action: "export"
    triggers: ["WPS", "wps", "金山办公", "金山文档", "金山文字", "WPS客户端", "docx", "Word文档", "Markdown", "md", "转换", "写文章", "导出PDF", "保存PDF", "插入图片", "插入表格", "生成表格", "字体颜色", "斜体"]
    trigger_patterns:
      - "(?:wps|金山办公|金山文档|金山文字|wps客户端).{0,30}(?:写文章|写文档|新建文档|新建文字|生成文档|导出\\s*pdf|保存\\s*pdf|导出)"
      - "(?:写文章|写文档|新建文档|新建文字|生成文档|导出\\s*pdf|保存\\s*pdf).{0,30}(?:wps|金山办公|金山文档|金山文字|wps客户端)"
      - "(?:wps|金山办公|金山文档|金山文字|wps客户端).{0,50}(?:写|创建|新建|生成).{0,50}(?:docx|word|文章|文档|文字)"
      - "(?:wps|金山办公|金山文档|金山文字|wps客户端).{0,80}(?:pdf|导出|保存|路径)"
      - "(?:\\.md|markdown).{0,80}(?:wps|金山办公|word|文章|文档|转换)"
    url_patterns: []
    description: "打开本机 WPS Writer（找不到时回退 Word），新建并格式化文字文档，AI 正文模式可按要求生成并在合适位置插入表格，可选择输出 PDF、Word 或同时输出两种格式"
    version: "1.0.0"
    examples:
      - "WPS写文章，标题是“测试标题”，内容是“测试正文”，最后导出PDF"
      - "用金山文档新建文字，标题是“周报”，正文是“第一段内容”，保存PDF"
      - "在WPS客户端生成文档，标题是“知乎文章”，内容是“正文内容”"
    params:
      title:
        type: title
        required: true
        description: "文档标题"
        ai_generate: true
      body:
        type: body
        required: true
        description: "正文内容"
        ai_generate: true
      markdown_path:
        type: string
        required: false
        description: "Markdown 源文件路径"
        extract_patterns:
          - '(?:Markdown路径|md路径|markdown_path|源文件|文件|路径)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z]:(?:[\\/])?[^"”\n]+?\.md)'
          - '["“]?([A-Za-z]:(?:[\\/])?[^"”\n]+?\.md)'
      body_format:
        type: string
        required: false
        description: "正文格式，支持 plain 或 markdown；AI 生成正文时自动使用 markdown"
      output_dir:
        type: string
        required: false
        description: "保存目录"
        extract_patterns:
          - '(?:输出目录|保存目录|导出目录|output_dir)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z]:[\\/][^"”\n]+)'
      docx_path:
        type: string
        required: false
        description: "docx 保存路径"
        extract_patterns:
          - '(?:docx路径|文档路径|保存路径|docx_path)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z]:(?:[\\/])?[^"”\n]+?\.docx)'
      pdf_path:
        type: string
        required: false
        description: "PDF 导出路径"
        extract_patterns:
          - '(?:PDF路径|pdf路径|导出路径|保存路径|路径|pdf_path)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z]:(?:[\\/])?[^"”\n]+?\.pdf)'
          - '(?:导出为|保存为)\s*["“]?([A-Za-z]:(?:[\\/])?[^"”\n]+?\.pdf)'
      output_format:
        type: string
        required: false
        default: "both"
        description: "输出文件格式：PDF、Word，或同时输出 PDF 和 Word；默认同时输出两种格式"
        extract_patterns:
          - '(?:输出格式|导出格式|保存格式|output_format)\s*(?:是|为|:|：)?\s*(PDF和Word|PDF\s*和\s*Word|两种形式|两种|PDF|Word|DOCX?)'
          - '(?:只|仅)(?:输出|导出|保存)\s*(PDF|Word|DOCX?)'
      file_name:
        type: string
        required: false
        default: "新建文档"
        description: "文档文件名，不含扩展名；执行时默认使用文章标题，标题为空时使用新建文档"
        extract_patterns:
          - '(?:文件名|文件名称|filename|file_name)\s*(?:是|为|:|：)?\s*["“]?([^"”，,。;；\n]+)'
      font_name:
        type: string
        required: false
        description: "正文和标题使用的字体名称"
        extract_patterns:
          - '(宋体|黑体|楷体(?:_GB2312)?|仿宋|微软雅黑|Microsoft YaHei|Arial|Times New Roman|SimSun)\s*\d*\s*号?'
          - '(?:字体|font)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z\u4e00-\u9fff ]+?)(?=\s*\d+\s*号|\s*字号|[,，。]|$)'
          - '([A-Za-z\u4e00-\u9fff ]+?)\s*\d+\s*号'
      font_size:
        type: string
        required: false
        description: "正文字号"
        extract_patterns:
          - '(?:字号|字体大小|font_size)\s*(?:是|为|:|：)?\s*(\d{1,2})'
          - '(?:字体|font).{0,20}?(\d{1,2})\s*号?'
      title_font_name:
        type: string
        required: false
        default: "方正小标宋简体"
        description: "标题字体名称，默认方正小标宋简体；标题居中且下空二行"
        extract_patterns:
          - '(?:标题字体|标题使用字体|标题的字体|title_font_name)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z\u4e00-\u9fff_ ]+?)(?=\s*\d+\s*号|\s*字号|[,，。;；]|$)'
      title_font_size:
        type: string
        required: false
        default: "22"
        description: "标题字号，默认二号（22磅）"
        extract_patterns:
          - '(?:标题字号|标题字体大小|title_font_size)\s*(?:是|为|:|：)?\s*(\d{1,2})'
      body_font_name:
        type: string
        required: false
        default: "仿宋_GB2312"
        description: "正文字体名称，默认仿宋_GB2312；Markdown 的 ## 一级标题使用三号黑体，### 二级标题使用三号楷体加粗"
        extract_patterns:
          - '(?:正文字体|正文使用字体|内容字体|body_font_name)\s*(?:是|为|:|：)?\s*["“]?([A-Za-z\u4e00-\u9fff_ ]+?)(?=\s*\d+\s*号|\s*字号|[,，。;；]|$)'
      body_font_size:
        type: string
        required: false
        default: "16"
        description: "正文字号，默认三号（16磅）"
        extract_patterns:
          - '(?:正文字号|正文字体大小|内容字号|body_font_size)\s*(?:是|为|:|：)?\s*(\d{1,2})'
      font_color:
        type: string
        required: false
        description: "正文和标题使用的字体颜色"
        extract_patterns:
          - '(?:字体颜色|颜色|font_color)\s*(?:是|为|:|：)?\s*(红色|蓝色|绿色|黑色|白色|黄色|灰色|red|blue|green|black|white|yellow|gray|grey)'
          - '(?:字体|font).{0,12}?(红色|蓝色|绿色|黑色|白色|黄色|灰色|red|blue|green|black|white|yellow|gray|grey)'
      italic:
        type: string
        required: false
        description: "是否使用斜体"
        extract_patterns:
          - '(斜体|italic)'
      insert_image:
        type: boolean
        required: false
        default: "-1"
        description: "是否在文档末尾插入本地图片；无法从用户指令判断时为 -1，并在执行前询问"
        extract_patterns:
          - '(?:是否)?(?:插入|添加|加入|放入)(?:一张|本地)?图片\s*(?:是|为|:|：)?\s*(是|否|需要|不需要|true|false|yes|no)'
      image_path:
        type: image_path
        required: false
        description: "需要插入到文档末尾的本地图片路径"
        extract_patterns:
          - '(?:插入图片|图片地址|图片路径|图片|image_path|image)\s*(?:是|为|时|位于|:|：)?\s*["“]?([A-Za-z]:(?:[\\/])?[^"”\n]+?\.(?:jpg|jpeg|png|webp|bmp|gif))'

  # ──────────────────────────────────────────────
  # 微信客户端
  # ──────────────────────────────────────────────

  - id: "domain/wechat_send_contact_file"
    name: "微信联系人发送文件"
    type: "domain"
    platform: "wechat"
    action: "send_file"
    triggers: ["微信", "wechat", "发送文件", "发文件", "传文件", "文件传输助手", "本地文件"]
    trigger_patterns:
      - '^(?!.*(?:不要|别|禁止|取消|请问|怎么|如何))(?=.*(?:微信|wechat))(?!.*(?:公众号|服务号))(?=.*(?:发送文件|发文件|传文件|发送|发|传))(?=.*(?:[A-Za-z]:[\/]|\\)).+$'
      - '^(?!.*(?:不要|别|禁止|取消|请问|怎么|如何))(?=.*(?:微信|wechat))(?!.*(?:公众号|服务号)).*(?:发送文件|发文件|传文件).*$'
    url_patterns: []
    description: "打开 Windows 微信客户端，搜索并验证指定联系人或群聊，直接发送一个本地文件"
    version: "1.0.0"
    examples:
      - '微信给张三发送"D:\comp_sci\培养方案.pdf"'
      - '用微信把"D:\docs\年度报告 2026.pdf"发给文件传输助手'
      - '微信发送"D:\project\需求说明.docx"给项目讨论群'
    params:
      recipient_name:
        type: string
        required: true
        confirm: false
        description: "微信联系人、群聊或文件传输助手的名称"
        extract_patterns:
          - '(?:微信|wechat)\s*(?:给|向)\s*["“]?(.+?)["”]?\s*(?:发送文件|发文件|传文件|发送|发|传)'
          - '(?:发给|发送给|传给)\s*["“]?([^"”\n]+?)["”]?\s*$'
          - '(?:给|向)\s*["“]?([^"”\n]+?)["”]?\s*$'
          - '(?:给|向)\s*["“]?(.+?)["”]?\s*(?:发送|发|传)'
      file_path:
        type: string
        required: true
        confirm: false
        description: "需要发送的本地文件绝对路径；路径包含空格时必须使用引号包裹"
        extract_patterns:
          - '["“]((?:[A-Za-z]:[\\/]|\\\\)[^"”\r\n]+)["”]'
          - '((?:[A-Za-z]:[\\/]|\\\\)[^"”\s]+?\.[A-Za-z0-9]{1,16})(?=\s*(?:给|发给|发送给|传给|$))'

  - id: "domain/wechat_send_contact_message"
    name: "微信联系人发消息"
    type: "domain"
    platform: "wechat"
    action: "send"
    triggers: ["微信", "wechat", "发送", "发消息", "私信", "联系人", "文件传输助手"]
    trigger_patterns:
      - '^(?=.*(?:微信|wechat))(?!.*(?:公众号|服务号))(?!.*(?:发送文件|发文件|传文件|文件路径|文件地址))(?!.*(?:[A-Za-z]:[\/]|\\)).*(?:给|向).{1,40}(?:发送|发消息|私信|发)'
    url_patterns: []
    description: "打开微信客户端，搜索指定联系人并发送一段消息"
    version: "1.0.0"
    examples:
      - "微信给文件传输助手发送你好"
      - "微信给张三发消息“你好呀”"
    params:
      contact_name:
        type: string
        required: true
        description: "微信联系人名称"
        extract_patterns:
          - '(?:微信|wechat)\s*(?:给|向)\s*["“]?(.+?)(?:发送|发消息|私信|发)'
          - '(?:给|向)\s*["“]?(.+?)(?:发送|发消息|私信|发)'
      message:
        type: string
        required: true
        description: "要发送的消息内容"
        extract_patterns:
          - '(?:发送|发消息|私信|发)\s*(?:消息|文字|内容)?\s*(?:是|为|:|：)?\s*["“]?([^"”\n]+)["”]?$'

  - id: "domain/wechat_follow_official_account"
    name: "微信关注公众号"
    type: "domain"
    platform: "wechat"
    action: "follow"
    triggers: ["微信", "wechat", "公众号", "服务号", "关注", "订阅", "火眼审阅"]
    trigger_patterns:
      - "(?:微信|wechat).{0,40}(?:关注|订阅).{0,40}(?:公众号|服务号)"
      - "(?:关注|订阅).{0,40}(?:公众号|服务号)"
    url_patterns: []
    description: "打开微信客户端，搜索指定公众号/服务号，选择服务号结果并关注"
    version: "1.0.0"
    examples:
      - "关注火眼审阅公众号"
      - "微信关注火眼审阅服务号"
    params:
      account_name:
        type: string
        required: true
        description: "公众号或服务号名称"
        extract_patterns:
          - '(?:关注|订阅)\s*["“]?(.+?)(?:公众号|服务号)["”]?$'
          - '(?:微信|wechat).{0,12}(?:关注|订阅)\s*["“]?(.+?)(?:公众号|服务号)["”]?$'
          - '(?:公众号|服务号)\s*(?:是|为|:|：)?\s*["“]?([^"”\n]+)'
      message:
        type: string
        required: false
        description: "关注后可选发送的私信内容"
        extract_patterns:
          - '(?:发送|发|私信)\s*(?:消息|文字|内容)?\s*(?:是|为|:|：)?\s*["“]?([^"”\n]+)["”]?$'

  - id: "domain/wechat_send_official_account_message"
    name: "微信公众号私信"
    type: "domain"
    platform: "wechat"
    action: "send"
    triggers: ["微信", "wechat", "公众号", "服务号", "发送", "私信", "发消息", "发文字", "火眼审阅"]
    trigger_patterns:
      - "(?:给|向).{1,40}(?:公众号|服务号).{0,20}(?:发送|发|私信|发消息)"
      - "(?:微信|wechat).{0,30}(?:公众号|服务号).{0,30}(?:发送|发|私信|发消息)"
    url_patterns: []
    description: "打开微信客户端，搜索指定公众号/服务号并发送一段私信"
    version: "1.0.0"
    examples:
