      - "淘宝上找一下手机壳"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/doubao_search"
    name: "豆包搜索"
    type: "domain"
    triggers: ["豆包", "doubao", "搜索", "问答"]
    url_patterns: ["doubao.com"]
    description: "在豆包搜索"
    version: "1.0.0"
    examples:
      - "在豆包搜索 AI 知识"
      - "用豆包搜一下机器学习"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/csnd_search"
    name: "CSDN 搜索"
    type: "domain"
    triggers: ["csnd", "csdn", "搜索", "问答"]
    url_patterns: ["csdn.net"]
    description: "在 CSDN 搜索技术文章"
    version: "1.0.0"
    examples:
      - "在 CSDN 搜索 Python 教程"
      - "csdn 上找一下 Java 面试题"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/xiaohongshu_search"
    name: "小红书搜索"
    type: "domain"
    triggers: ["xiaohongshu", "小红书", "小红书搜索", "小红书 搜索", "小红书上找", "搜索小红书"]
    url_patterns: ["xiaohongshu.com"]
    description: "在小红书搜索笔记和内容"
    version: "1.0.0"
    examples:
      - "在小红书搜索旅游攻略"
      - "小红书上找一下美食推荐"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/zhihu_send"
    name: "知乎发布"
    type: "domain"
    triggers: ["知乎发布", "知乎 发布", "发布", "写文章", "发文章", "投稿"]
    url_patterns: ["zhihu.com", "zhuanlan.zhihu.com"]
    description: "在知乎发布文章"
    version: "1.0.0"
    examples:
      - "在知乎发布一篇文章"
      - "知乎发文章 内容是 如何学习编程"
    params:
      keyword:
        type: quoted
        required: true
        description: "文章内容"
        extract_patterns:
          - "(?:在|到)?知乎(?:上)?(?:发布|发表|发|写)(?:文章|帖子|回答)?\\s*[:：]?\\s*(.+)$"
          - "(?:发布|发表|发|写)(?:文章|帖子|回答)?\\s*[:：]?\\s*(.+)$"
    confirm_before_run: true

  # ──────────────────────────────────────────────
  # 通用交互模板
  # ──────────────────────────────────────────────

  - id: "interaction/login_flow"
    name: "通用登录"
    type: "interaction"
    triggers: ["登录", "login", "sign in", "signin"]
    url_patterns: []
    description: "通用登录流程：填写用户名密码并提交"
    version: "1.0.0"
    examples:
      - "登录这个网站"
      - "帮我登录当前页面的账号"

  - id: "interaction/search_flow"
    name: "通用搜索"
    type: "interaction"
    triggers: ["搜索", "search", "查找", "find"]
    url_patterns: []
    description: "通用搜索流程：输入关键词并点击搜索"
    version: "1.0.0"
    examples:
      - "搜索一下这个网站"
      - "在当前页面搜索"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "interaction/form_fill"
    name: "通用表单填写"
    type: "interaction"
    triggers: ["表单", "form", "填写", "fill", "注册", "register"]
    url_patterns: []
    description: "通用表单填写：批量填写多个表单字段"
    version: "1.0.0"
    examples:
      - "帮我填写这个表单"
      - "注册一个账号"

  - id: "interaction/pagination"
    name: "通用分页翻页"
    type: "interaction"
    triggers: ["分页", "pagination", "翻页", "next", "下一页"]
    url_patterns: []
    description: "通用分页翻页：遍历多页内容"
    version: "1.0.0"
    examples:
      - "翻到下一页"
      - "继续浏览下一页"

# ──────────────────────────────────────────────
# sources 段 -- 文件映射
# ──────────────────────────────────────────────

sources:
