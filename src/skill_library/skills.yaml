        required: true
        description: "搜索关键词"

  - id: "domain/bilibili_search"
    name: "Bilibili 搜索"
    type: "domain"
    triggers: ["bilibili", "B站", "b站", "哔哩哔哩", "哔哩", "视频", "搜索", "search"]
    url_patterns: ["bilibili.com"]
    description: "在 Bilibili 搜索视频、番剧、用户和相关内容"
    version: "1.0.0"
    examples:
      - "在 B 站搜索 Python 教程"
      - "bilibili 上找一下游戏视频"
      - "去哔哩哔哩搜一下编程入门"
    params:
      keyword:
        type: keyword
        required: true
        description: "搜索关键词"

  - id: "domain/bilibili_login"
    name: "Bilibili 短信登录"
    type: "domain"
    triggers: ["bilibili 登录"]
    url_patterns: ["bilibili.com", "*.bilibili.com"]
    description: "打开 Bilibili 登录弹窗，切换短信登录，填写手机号并发送验证码，真人认证和验证码由用户手动完成"
    version: "1.0.0"
    examples:
      - "B站登录"
      - "bilibili 短信登录"
      - "帮我登录 B 站"
    params:
      phone:
        type: phone
        required: true
        description: "手机号码"

  - id: "domain/bilibili_publish"
    name: "Bilibili 文章投稿"
    type: "domain"
    triggers: ["bilibili 投稿"]
    url_patterns: ["bilibili.com", "*.bilibili.com", "member.bilibili.com"]
    description: "完成 Bilibili 短信登录后进入文章投稿页，填写标题和正文并点击发布"
    version: "1.0.0"
    examples:
      - "在 B 站投稿一篇文章"
      - "bilibili 发布文章"
    params:
      phone:
        type: phone
        required: true
        description: "手机号码"
      title:
        type: string
        required: true
        description: "文章标题"
        extract_patterns:
          - "(?:标题|题目|title)\\s*(?:是|为|:|：)?\\s*['\"\"'']?(.*?)(?=(?:正文|内容|文章内容|body|content)\\s*(?:是|为|:|：)|$)"
      body:
        type: string
        required: true
        description: "文章正文"
        extract_patterns:
          - "(?:正文|内容|文章内容|body|content)\\s*(?:是|为|:|：)?\\s*['\"\"'']?(.+)$"
    confirm_before_run: true

  - id: "domain/bilibili_comment"
    name: "Bilibili 视频评论"
    type: "domain"
    triggers: ["bilibili 视频留言"]
    url_patterns: ["bilibili.com", "*.bilibili.com", "bilibili.com/video/"]
    description: "完成 Bilibili 短信登录后进入视频页面，填写评论内容并点击发送"
    version: "1.0.0"
    examples:
      - "在 B 站视频下面留言"
      - "bilibili 视频评论"
    params:
      phone:
        type: phone
        required: true
        description: "手机号码"
      comment:
        type: quoted
        required: true
        description: "评论内容"
        extract_patterns:
          - "(?:评论|留言|回复)\\s*(?:是|为|:|：)?\\s*['\"\"'']?(.+?)(?=(?:在|然后|并且|接着)|$)"
      video_url:
        type: url
        required: false
        description: "视频 URL（可选，默认使用当前页面）"
    confirm_before_run: true

  # ──────────────────────────────────────────────
  # 社交媒体
  # ──────────────────────────────────────────────

  - id: "domain/douyin_login"
    name: "抖音验证码登录"
    type: "domain"
    triggers: ["抖音", "douyin", "douyin.com", "登录", "login", "验证码"]
    url_patterns: ["douyin.com", "*.douyin.com"]
    description: "填写抖音手机号并获取短信验证码，验证码由用户手动输入"
    version: "1.0.0"
    examples:
      - "登录抖音"
      - "帮我登录抖音账号"
    params:
      phone:
        type: phone
        required: true
        description: "手机号码"

  - id: "domain/xiaohongshu_login"
    name: "小红书验证码登录"
    type: "domain"
    triggers: ["小红书 登录"]
    url_patterns: ["xiaohongshu.com", "*.xiaohongshu.com"]
    description: "填写小红书手机号、勾选协议并获取短信验证码，验证码由用户手动输入"
    version: "1.0.0"
    examples:
      - "登录小红书"
      - "帮我登录小红书账号"
    params:
      phone:
        type: phone
        required: true
        description: "手机号码"

  - id: "domain/xiaohongshu_publish"
    name: "小红书发布"
    type: "domain"
    triggers:
      - "小红书 发布"
      - "小红书发布"
      - "小红书上传"
      - "小红书图文"
      - "小红书笔记"
      - "小红书文章"
      - "小红书长文"
      - "小红书视频"
      - "小红书投稿"
      - "发布图文"
      - "发布笔记"
      - "发布文章"
      - "发布长文"
      - "发布视频"
      - "发布小说"
      - "写文章"
      - "写长文"
      - "发文章"
      - "发长文"
      - "发图文"
      - "发笔记"
      - "上传图文"
      - "上传图片"
      - "上传视频"
      - "发视频"
      - "视频地址"
      - "视频路径"
      - "图片地址"
      - "图片路径"
      - "文字配图"
      - "生成图片"
    url_patterns: ["xiaohongshu.com", "*.xiaohongshu.com", "creator.xiaohongshu.com"]
    description: "检查小红书登录状态，必要时填写手机号并获取验证码，登录成功后发布图文、上传图片、上传视频或发布文章"
    version: "1.0.0"
    examples:
      - "在小红书发布一篇图文笔记"
      - "小红书发一条笔记 内容是 今天天气真好"
      - "帮我发一个小红书图文"
      - "小红书发布文章，标题是“测试发布功能”，内容“测试发布功能”"
      - "小红书上传视频，视频地址是 \"D:\\xxx\\clip.mp4\"，标题是“视频标题”，正文是“视频正文”"
    params:
      keyword:
        type: quoted
        required: true
        description: "图文内容 / 笔记文案"
        extract_patterns:
          - "(?:图文内容|笔记内容|发布内容|内容|正文|文案|caption|content)\\s*(?:是|为|:|：)?\\s*['\"\"'']?(.+?)(?=\\s*(?:电话号码|电话|手机号|phone)\\s*(?:是|为|:|：)|$)"
          - "(?:发布|发表|生成).{0,12}(?:图文|笔记).{0,16}['\"\"'']?(.+?)['\"\"'']"
      phone:
        type: phone
        required: false
        description: "手机号码（登录用，可选）"
    confirm_before_run: true

  - id: "domain/weibo_search"
    name: "微博搜索"
    type: "domain"
    triggers: ["微博", "weibo", "搜索"]
    url_patterns: ["weibo.com"]
