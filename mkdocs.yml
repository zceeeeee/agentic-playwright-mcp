site_name: Agentic Playwright MCP
site_description: MCP server for agentic browser automation with Playwright
site_url: https://your-username.github.io/agentic-playwright-mcp
repo_url: https://github.com/your-username/agentic-playwright-mcp
repo_name: agentic-playwright-mcp

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: false
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: your-username
      repo: agentic-playwright-mcp
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - 首页: index.md
  - 团队介绍: team-intro.md
  - 快速开始: quickstart.md
  - 架构: architecture.md
  - 技能库: skills.md
  - 站点目录: site-catalog.md
  - 技能开发: skill-development-guide.md
  - API 参考: api.md
  - 决策记录:
      - 概览: adr/index.md
      - 三层架构: adr/001-three-layer-architecture.md
      - 沙箱脚本引擎: adr/002-sandboxed-script-engine.md
      - Agent 循环设计: adr/003-agent-loop-design.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username/agentic-playwright-mcp
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentic-playwright-mcp/

