id: bilibili_comment
name: Bilibili 视频评论
type: domain
description: 进入 Bilibili 视频页后完成短信登录，登录完成后等待 20 秒，再下滑填写评论内容并点击评论框右下方蓝色发布按钮。
version: "1.0.0"

triggers:
  - bilibili
  - B站
  - b站
  - 哔哩哔哩
  - 哔哩
  - 评论
  - 留言
  - 交流
  - 回复
  - 讨论
  - 视频
  - 发评论
  - 发布评论
  - 视频评论
  - 视频留言

url_patterns:
  - bilibili.com
  - "*.bilibili.com"
  - bilibili.com/video/

domain: bilibili

parameters:
  phone_number:
    type: string
    required: true
    description: 用户手机号，例如 13574133406。
  comment_text:
    type: string
    required: true
    description: 评论内容。
  video_url:
    type: string
    required: false
    default: "https://www.bilibili.com/video/BV1oh7b6xE4R"
    description: Bilibili 视频 URL。

steps:
  - action: goto
    args:
      url: "{{video_url}}"
    comment: 进入指定 Bilibili 视频页面

  - action: smart_click
    target: login_button
    comment: 点击右上角蓝色“登录”按钮
    on_error: continue

  - action: smart_click
    target: sms_login
    comment: 识别到“短信登录”后点击弹窗中的短信登录
    on_error: continue

  - action: smart_fill
    target: phone
    value: "{{phone_number}}"
    comment: 填写手机号

  - action: smart_click
    target: get_code
    comment: 点击发送验证码

  - action: wait
    args:
      seconds: 20
    comment: 登录完成后等待页面稳定

  - action: smart_fill
    target: comment_input
    value: "{{comment_text}}"
    comment: 下滑找到评论框并填写评论内容
    on_error: stop

  - action: smart_click
    target: send_comment_button
    comment: 点击评论框右下方蓝色“发布”按钮
    on_error: stop
