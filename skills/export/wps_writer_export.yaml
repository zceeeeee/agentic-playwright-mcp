id: wps_writer_export
name: WPS 写文章并导出 PDF
type: domain
description: 打开本机 WPS Writer（找不到时回退 Word），新建文字文档，写入标题和正文，设置标题、字体、段落和编号样式，保存 docx 并导出 PDF。
version: "1.0.0"

triggers:
  - WPS
  - wps
  - 金山办公
  - 金山文档
  - 金山文字
  - WPS客户端
  - docx
  - Word文档
  - Markdown
  - md
  - 转换
  - 导出PDF
  - 保存PDF
  - 写文档

url_patterns: []
domain: wps

parameters:
  title:
    type: string
    required: false
    description: 文档标题。
  body:
    type: string
    required: false
    description: 正文内容；提供 Markdown 文件时可省略。
  markdown_path:
    type: string
    required: false
    description: Markdown 源文件路径。
  output_dir:
    type: string
    required: false
    description: 保存目录，未指定时保存到用户 Documents 下的 agentic-playwright-mcp/wps_exports。
  docx_path:
    type: string
    required: false
    description: docx 保存路径。
  pdf_path:
    type: string
    required: false
    description: PDF 导出路径。
  file_name:
    type: string
    required: false
    description: 文档文件名。
  font_name:
    type: string
    required: false
    description: 字体名称，例如宋体。
  font_size:
    type: string
    required: false
    description: 正文字号，例如14。
  font_color:
    type: string
    required: false
    description: 字体颜色，例如红色。
  italic:
    type: string
    required: false
    description: 是否使用斜体。
  image_path:
    type: string
    required: false
    description: 插入到文章末尾的本地图片路径。

steps:
  - action: local_desktop
    target: wps_writer
    comment: 启动 WPS Writer COM 接口；如果不可用，则尝试 Microsoft Word。
  - action: create_document
    comment: 新建文字文档。
  - action: fill
    target: title
    value: "{{title}}"
    comment: 写入并居中加粗标题。
  - action: fill
    target: body
    value: "{{body}}"
    comment: 写入正文；如果提供 Markdown 文件，则按标题、粗体、斜体等 Markdown 格式写入。
  - action: insert
    target: image
    value: "{{image_path}}"
    comment: 如果提供图片路径，则插入本地图片。
  - action: save
    target: docx
    value: "{{docx_path}}"
    comment: 保存 docx 文档。
  - action: export
    target: pdf
    value: "{{pdf_path}}"
    comment: 导出 PDF。
